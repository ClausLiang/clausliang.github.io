  <style>
    :root {
      --container: 1120px;
      --bg: #f5f6f8;
      --card: #ffffff;
      --card-muted: #f9fafb;
      --card-hover: #f3f7ff;
      --text: #111827;
      --muted: rgba(17, 24, 39, 0.60);
      --border: rgba(17, 24, 39, 0.12);
      --primary: #1677ff;
      --radius-lg: 16px;
      --radius-md: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial;
      line-height: 1.6;
      text-rendering: optimizeLegibility;
    }

    /* 导航 */
    .nav {
      background-color: var(--card);
      border-bottom: 1px solid rgba(17, 24, 39, 0.10);
    }

    .nav-inner {
      height: 52px;
      position: relative;
      width: min(var(--container), calc(100vw - 32px));
      margin: 0 auto;
    }

    .brand {
      height: 52px;
      position: absolute;
      top: 0;
      left: 0;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.2px;
      color: rgba(17, 24, 39, 0.88);
      text-decoration: none;
    }

    .brand img {
      display: block;
    }

    /* 主区域 */
    .wrapper {
      min-height: 400px;
      width: min(var(--container), calc(100vw - 32px));
      margin: 18px auto 40px;
      padding: 22px;
      background-color: var(--card);
      border: 1px solid rgba(17, 24, 39, 0.10);
      border-radius: var(--radius-lg);
      box-shadow: 0 1px 2px rgba(17, 24, 39, 0.06);
    }

    .list-wrapper {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .item {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px 12px;
      min-height: 92px;
      font-size: 13px;
      font-weight: 650;
      border-radius: var(--radius-md);
      overflow: hidden;
      color: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--border);
      background: var(--card-muted);
      user-select: none;
    }

    .item .item-title {
      text-align: center;
      word-break: break-word;
      display: -webkit-box;
      line-clamp: 2;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.25;
    }

    a {
      text-decoration: none;
      color: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    a:hover .item {
      border-color: rgba(22, 119, 255, 0.55);
      background: var(--card-hover);
    }

    a:focus-visible .item {
      outline: 2px solid rgba(22, 119, 255, 0.55);
      outline-offset: 3px;
    }

    .section-title {
      margin: 14px 0 12px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: rgba(17, 24, 39, 0.78);
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(17, 24, 39, 0.08);
    }

    .section-title.first {
      margin-top: 0;
    }

    @media (max-width: 520px) {
      .wrapper {
        padding: 16px;
      }

      .list-wrapper {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 10px;
      }

      .brand {
        font-size: 16px;
      }
    }
  </style>
</head>
