  <style>
    :root {
      --container: 1120px;
      --bg: #f5f6f8;
      --card: #ffffff;
      --text: #111827;
      --muted: rgba(17, 24, 39, 0.60);
      --border: rgba(17, 24, 39, 0.12);
      --primary: #1677ff;
      --radius-lg: 16px;
      --radius-md: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial;
      line-height: 1.6;
    }

    /* 导航 */
    .nav {
      background-color: var(--card);
      border-bottom: 1px solid rgba(17, 24, 39, 0.10);
    }

    .nav .nav-inner {
      height: 52px;
      position: relative;
      width: min(var(--container), calc(100vw - 32px));
      margin: 0 auto;
    }

    .brand {
      height: 52px;
      position: absolute;
      top: 0;
      left: 0;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.2px;
      color: rgba(17, 24, 39, 0.88);
      text-decoration: none;
    }

    .brand img {
      display: block;
    }

    /* 主区域 */
    .wrapper {
      min-height: 400px;
      width: min(var(--container), calc(100vw - 32px));
      margin: 18px auto 40px;
      padding: 22px;
      background-color: var(--card);
      border: 1px solid rgba(17, 24, 39, 0.10);
      border-radius: var(--radius-lg);
      box-shadow: 0 1px 2px rgba(17, 24, 39, 0.06);
    }

    .list-wrapper {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    /* 每个卡片 */
    .item {
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: #f9fafb;
      overflow: hidden;
      cursor: pointer;
      user-select: none;
    }

    .item:hover {
      border-color: rgba(22, 119, 255, 0.45);
      background: #f3f7ff;
    }

    .item img {
      width: 100%;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      display: block;
    }

    .item .item-tip {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding: 8px 10px;
      border-top: 1px solid rgba(17, 24, 39, 0.08);
    }

    a {
      text-decoration: none;
    }

    .section-title {
      margin: 14px 0 12px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: rgba(17, 24, 39, 0.78);
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(17, 24, 39, 0.08);
    }

    .section-title.first {
      margin-top: 0;
    }

    .tag-new {
      color: var(--primary);
      font-weight: 700;
    }

    /* 大图预览 */
    .viewer {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.78);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 999;
    }

    .viewer img {
      max-width: min(1100px, calc(100vw - 36px));
      max-height: calc(100vh - 36px);
      width: auto;
      height: auto;
      object-fit: contain;
      background: rgba(0, 0, 0, 0.15);
      border-radius: 10px;
    }

    .no-scroll {
      overflow: hidden;
    }

    /* 手机 */
    @media (max-width: 1000px) {
      .nav .nav-inner{
        width: min(var(--container), calc(100vw - 32px));
      }
    }

    @media (max-width: 520px) {
      .wrapper {
        padding: 16px;
      }

      .list-wrapper {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 10px;
      }

      .brand {
        font-size: 16px;
      }
    }
  </style>
</head>

<script>
  function showBigImg(node) {
    const src = node.querySelector('img')?.src
    if (!src) return

    // 避免重复打开
    if (document.querySelector('.viewer')) return

    const overlay = document.createElement('div')
    overlay.className = 'viewer'
    overlay.setAttribute('role', 'dialog')
    overlay.setAttribute('aria-label', '图片预览，点击关闭')

    const img = document.createElement('img')
    img.src = src
    img.alt = ''

    overlay.appendChild(img)
    overlay.addEventListener('click', () => {
      overlay.remove()
      document.body.classList.remove('no-scroll')
    })

    document.body.classList.add('no-scroll')
    document.body.appendChild(overlay)

    // ESC 关闭（只注册一次）
    if (!window.__wardrobeEscBound) {
      window.__wardrobeEscBound = true
      window.addEventListener('keydown', (e) => {
        if (e.key !== 'Escape') return
        const v = document.querySelector('.viewer')
        if (v) {
          v.remove()
          document.body.classList.remove('no-scroll')
        }
      })
    }
  }
</script>
